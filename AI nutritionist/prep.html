<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI Fruit Scanner (PC Brain)</title>
    <style>
      body { font-family: system-ui, Arial; margin: 16px; }
      .row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }
      .card { border: 1px solid #ddd; border-radius: 12px; padding: 12px; }
      input, button { font-size: 16px; padding: 8px; }
      #preview {
        width: 360px;
        max-width: 90vw;
        border-radius: 12px;
        border: 1px solid #ddd;
        background: #f5f5f5;
      }
      #log {
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
      }
      .big { font-size: 20px; font-weight: 700; }
      .muted { color: #555; }
    </style>
  </head>

  <body>
    <h2>AI Fruit Scanner (PC Brain)</h2>

    <div class="row">
      <div class="card">
        <div style="margin-bottom: 8px">
          <label>ESP32-CAM address (example: 192.168.31.58):</label><br />
          <input id="ip" value="192.168.31.58" />
          <button id="connectBtn">Connect</button>
        </div>

        <div style="margin-bottom: 8px">
          <label>Confidence threshold:</label>
          <input id="th" type="number" step="0.01" min="0" max="1" value="0.85" style="width: 100px" />
        </div>

        <div class="big" id="status">Status: idle</div>
        <div id="top">Top: -</div>
        <div class="muted" id="lastSent">Last sent: -</div>
        <div id="classes"></div>
      </div>

      <div class="card">
        <div style="margin-bottom: 8px">Live preview (from /capture):</div>
        <img id="preview" alt="preview" />
      </div>

      <div class="card" style="min-width: 320px">
        <div style="margin-bottom: 8px">Debug log:</div>
        <div id="log"></div>
      </div>
    </div>

    <!-- TensorFlow.js + Teachable Machine Image -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

    <script>
      const els = {
        ip: document.getElementById("ip"),
        th: document.getElementById("th"),
        connectBtn: document.getElementById("connectBtn"),
        preview: document.getElementById("preview"),
        status: document.getElementById("status"),
        top: document.getElementById("top"),
        classes: document.getElementById("classes"),
        lastSent: document.getElementById("lastSent"),
        log: document.getElementById("log"),
      };

      let model = null;
      let espBase = "";     // e.g. http://192.168.31.58:81
      let running = false;

      let lastSentLabel = "";
      let lastSentScore = 0;
      let lastSentAt = 0;

      const CAPTURE_INTERVAL_MS = 700;
      const SEND_COOLDOWN_MS = 900;
      const SCORE_DELTA_TO_RESEND = 0.05;

      function log(msg) {
        const t = new Date().toLocaleTimeString();
        els.log.textContent = `[${t}] ${msg}\n` + els.log.textContent;
      }

      function normalizeEspBase(input) {
        let s = input.trim();

        // Strip any pasted path like /stream or /capture
        s = s.replace(/\/(stream|capture).*$/i, "");

        // Add protocol if missing
        if (!/^https?:\/\//i.test(s)) s = "http://" + s;

        const u = new URL(s);

        // Default port to 81 if missing
        if (!u.port) u.port = "81";

        return `${u.protocol}//${u.hostname}:${u.port}`;
      }

      async function loadModel() {
        els.status.textContent = "Status: loading model...";
        const URL = "./";
        model = await tmImage.load(URL + "model.json", URL + "metadata.json");
        els.status.textContent = "Status: model loaded";
        log("Model loaded. Classes: " + model.getTotalClasses());
      }

      async function fetchSnapshotBlob() {
        const url = `${espBase}/capture?t=${Date.now()}`;
        const res = await fetch(url, { cache: "no-store" });
        if (!res.ok) throw new Error("capture failed: " + res.status);
        return await res.blob();
      }

      async function blobToImage(blob) {
        const img = new Image();
        const objUrl = URL.createObjectURL(blob);
        img.src = objUrl;

        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
        });

        URL.revokeObjectURL(objUrl);
        return img;
      }

      function updatePreviewFromBlob(blob) {
        const objUrl = URL.createObjectURL(blob);
        els.preview.src = objUrl;
        // revoke after the image loads
        els.preview.onload = () => URL.revokeObjectURL(objUrl);
      }

      function renderPredictions(predictions) {
        predictions.sort((a, b) => b.probability - a.probability);
        const top = predictions[0];
        const pct = Math.round(top.probability * 100);

        els.top.textContent = `Top: ${top.className} (${pct}%)`;

        let html = "";
        for (const p of predictions) {
          const pc = Math.round(p.probability * 100);
          html += `${p.className}: ${pc}%<br/>`;
        }
        els.classes.innerHTML = html;

        return top;
      }

      async function sendToESP(label, score) {
        const url =
          `${espBase}/ai?label=${encodeURIComponent(label)}&score=${encodeURIComponent(score.toFixed(3))}`;

        const res = await fetch(url, { method: "GET", cache: "no-store" });
        if (!res.ok) throw new Error("ai send failed: " + res.status);

        return res.json().catch(() => ({}));
      }

      async function loopPredict() {
        running = true;
        els.status.textContent = "Status: scanning...";
        log("Started scanning loop.");

        while (running) {
          try {
            // 1) Get snapshot once
            const blob = await fetchSnapshotBlob();

            // 2) Show preview to the student (no /stream)
            updatePreviewFromBlob(blob);

            // 3) Predict on the same snapshot
            const img = await blobToImage(blob);
            const predictions = await model.predict(img, false);
            const top = renderPredictions(predictions);

            // 4) Decide whether to send result to ESP
            const threshold = parseFloat(els.th.value || "0.85");
            const now = Date.now();

            const label = top.className;
            const score = top.probability;

            const cooldownOk = now - lastSentAt > SEND_COOLDOWN_MS;
            const labelChanged = label !== lastSentLabel;
            const scoreChangedEnough = Math.abs(score - lastSentScore) >= SCORE_DELTA_TO_RESEND;

            if (score >= threshold && cooldownOk && (labelChanged || scoreChangedEnough)) {
              await sendToESP(label, score);

              lastSentLabel = label;
              lastSentScore = score;
              lastSentAt = now;

              els.lastSent.textContent = `Last sent: ${label} (${(score * 100).toFixed(1)}%)`;
              log(`Sent -> ESP: ${label} (${(score * 100).toFixed(1)}%)`);
            }
          } catch (err) {
            els.status.textContent = "Status: error (check IP / WiFi)";
            log("Error: " + err.message);
          }

          await new Promise((r) => setTimeout(r, CAPTURE_INTERVAL_MS));
        }
      }

      els.connectBtn.onclick = async () => {
        espBase = normalizeEspBase(els.ip.value);
        log("Using ESP base: " + espBase);

        // Quick connectivity test
        els.status.textContent = "Status: testing connection...";
        try {
          // If this works, capture is alive
          await fetch(`${espBase}/capture?t=${Date.now()}`, { cache: "no-store" });
          els.status.textContent = "Status: connected";
          log("Capture endpoint OK.");
        } catch (e) {
          els.status.textContent = "Status: cannot reach ESP";
          log("Connection test failed: " + e.message);
          return;
        }

        if (!model) await loadModel();
        if (!running) loopPredict();
      };

      // Preload model (nice UX)
      loadModel().catch((e) => log("Model load error: " + e.message));
    </script>
  </body>
</html>
